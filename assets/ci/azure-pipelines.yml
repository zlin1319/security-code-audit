trigger:
  branches:
    include:
      - main
      - master

pr:
  branches:
    include:
      - "*"

pool:
  vmImage: ubuntu-latest

steps:
  - checkout: self
    fetchDepth: 0

  - task: UsePythonVersion@0
    inputs:
      versionSpec: "3.x"

  - bash: |
      set +e
      OUTPUT_DIR="reports/security-audit"
      if [ -n "$(System.PullRequest.TargetBranch)" ]; then
        target_branch="$(System.PullRequest.TargetBranch)"
        target_branch="${target_branch#refs/heads/}"
        git fetch origin "$target_branch"
        python3 -m security_code_audit \
          --path . \
          --language other \
          --ruleset all \
          --git-diff-range "origin/$target_branch...$(Build.SourceVersion)" \
          --output "$OUTPUT_DIR"
      else
        python3 -m security_code_audit \
          --path . \
          --language other \
          --ruleset all \
          --output "$OUTPUT_DIR"
      fi
      scan_exit_code=$?
      echo "##vso[task.setvariable variable=ScanExitCode]$scan_exit_code"
      exit 0
    displayName: Run security audit

  - task: AdvancedSecurity-Publish@1
    displayName: Publish SARIF to Azure DevOps code scanning
    inputs:
      SarifsInputDirectory: "$(Build.SourcesDirectory)/reports/security-audit"
    condition: always()

  - task: PublishBuildArtifacts@1
    displayName: Publish audit reports
    inputs:
      PathtoPublish: "$(Build.SourcesDirectory)/reports/security-audit"
      ArtifactName: security-audit-reports
    condition: always()

  - bash: exit "$ScanExitCode"
    displayName: Preserve scan exit code
    condition: always()
